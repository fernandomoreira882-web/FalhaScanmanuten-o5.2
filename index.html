<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>FMX SCANNER - APG Taubaté</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --safety-blue: #0056b3;
            --success-green: #28a745;
            --danger-red: #dc3545;
            --warning-orange: #fd7e14;
            --light-bg: #f0f2f5;
            --white: #ffffff;
            --vibrant-blue: #007bff;
            --vibrant-green: #218838;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--light-bg); 
            padding-bottom: 60px; 
            min-height: 100vh;
        }
        
        header { background: var(--safety-blue); color: white; padding: 15px; text-align: center; }
        header h1 { margin: 0; font-size: 22px; }
        header p { margin: 0; font-size: 12px; text-transform: uppercase; }

        nav { 
            display: flex; 
            overflow-x: auto; 
            background: var(--white); 
            border-bottom: 1px solid #ddd; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        nav button { flex: 0 0 auto; background: none; border: none; padding: 12px 15px; font-weight: bold; color: #666; cursor: pointer; }
        nav button.active { color: var(--safety-blue); border-bottom: 4px solid var(--safety-blue); }

        .container { 
            padding: 15px; 
            max-width: 800px; 
            margin: auto;
        }
        
        /* CORREÇÃO DAS TELAS */
        .screen { display: none; }
        .screen.active { display: block; }

        .card { 
            background: var(--white); 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-left: 6px solid var(--safety-blue); 
            position: relative; 
        }

        h3 { margin-top: 0; color: var(--safety-blue); border-bottom: 1px solid #eee; padding-bottom: 8px; font-weight: 800; }

        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px; box-sizing: border-box; font-size: 16px; }
        
        .btn-main { background: var(--safety-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-size: 14px; margin-top: 10px; cursor: pointer; }

        .badge { padding: 5px 10px; border-radius: 6px; color: white; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .critical { background: #000; } 
        .high { background: var(--danger-red); } 
        .medium { background: var(--warning-orange); } 
        .low { background: var(--success-green); }

        .btn-delete { position: absolute; top: 15px; right: 15px; background: #fff1f1; border: none; color: var(--danger-red); font-size: 20px; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; }

        .txt-blue { color: var(--vibrant-blue); font-weight: 800; }
        .txt-green { color: var(--vibrant-green); font-weight: 800; }
        .tag-info { background: #eef2f7; padding: 4px 8px; border-radius: 5px; font-weight: 900; color: var(--safety-blue); }
        
        .time-header { background: #e9ecef; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; color: var(--safety-blue); font-weight: 900; border-left: 5px solid var(--safety-blue); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<header>
    <h1>FMX SCANNER</h1>
    <p>APG TAUBATÉ MANUTENÇÃO</p>
</header>

<nav id="navBar">
    <button onclick="changeScreen('tela1')" id="nav-tela1" class="active">Registro</button>
    <button onclick="changeScreen('tela2')" id="nav-tela2">Análise</button>
    <button onclick="changeScreen('tela3')" id="nav-tela3">Plano de Ação</button>
    <button onclick="changeScreen('tela4')" id="nav-tela4">Indicadores</button>
    <button onclick="changeScreen('tela6')" id="nav-tela6">Report Time</button>
    <button onclick="changeScreen('tela7')" id="nav-tela7">Backup</button>
</nav>

<div id="modalRepro" class="modal-overlay">
    <div class="modal-content">
        <h3>Reprogramar Prazo</h3>
        <p id="repro-tag-info"></p>
        <label>Nova Data</label>
        <input type="date" id="new-repro-date">
        <button class="btn-main" onclick="confirmarReprogramacao()">ATUALIZAR</button>
        <button class="btn-secondary" onclick="closeReproModal()">CANCELAR</button>
    </div>
</div>

<div class="container">
    <section id="tela1" class="screen active">
        <div class="card">
            <h3>Entrada de Manutenção</h3>
            <label>Data</label><input type="date" id="f-data">
            <label>Técnico</label><input type="text" id="f-tecnico" placeholder="Nome do técnico">
            <label>TAG</label><input type="text" id="f-tag" list="lista-tags" placeholder="Ex: FKL 6">
            <datalist id="lista-tags"></datalist>
            
            <label>Time</label>
            <select id="f-time">
                <option>Time 1</option><option>Time 2</option><option>Time 3</option>
            </select>
            
            <label>Setor</label>
            <select id="f-setor">
                <option>Mecânica</option><option>Hidráulica</option><option>Pneumática</option>
                <option>Elétrica</option><option>Robótica</option><option>Processo</option>
                <option>Operacional</option>
            </select>
            
            <label>Ocorrência</label><textarea id="f-falha" rows="3"></textarea>
            <label>Ação Tomada</label><textarea id="f-acao" rows="3"></textarea>
            <button class="btn-main" onclick="salvarRegistro()">SALVAR REGISTRO</button>
        </div>
    </section>

    <section id="tela2" class="screen"><div id="analise-lista"></div></section>

    <section id="tela3" class="screen">
        <div class="card">
            <h3>Novo Plano de Ação</h3>
            <label>TAG</label><select id="p-tag"></select>
            <label>Atividade</label><textarea id="p-desc"></textarea>
            <label>Prazo</label><input type="date" id="p-prazo">
            <label>Responsável</label><input type="text" id="p-resp">
            <button class="btn-main" onclick="salvarPlano()">GERAR PLANO</button>
        </div>
        <div id="lista-planos"></div>
    </section>

    <section id="tela4" class="screen">
        <div class="card">
            <h3>Falhas por Setor (%)</h3>
            <div style="height:300px;"><canvas id="graficoSetores"></canvas></div>
        </div>
    </section>

    <section id="tela6" class="screen">
        <div class="card"><input type="text" id="search-report" onkeyup="renderReport()" placeholder="Pesquisar..."></div>
        <div id="report-lista"></div>
    </section>

    <section id="tela7" class="screen">
        <div class="card">
            <h3>Banco de Dados</h3>
            <button class="btn-main" onclick="exportarDados()">EXPORTAR BACKUP (.JSON)</button>
            <hr>
            <label>Importar Backup</label>
            <input type="file" id="importFile" accept=".json">
            <button class="btn-secondary" onclick="importarDados()">IMPORTAR ARQUIVO</button>
        </div>
    </section>
</div>

<script>
    // INICIALIZAÇÃO DE DADOS
    let db = JSON.parse(localStorage.getItem('fmx_db')) || [];
    let planos = JSON.parse(localStorage.getItem('fmx_planos')) || {};
    let chartFmx = null;
    let currentReproId = null;

    // NAVEGAÇÃO
    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
        
        if(id === 'tela1') atualizarDatalist();
        if(id === 'tela2') renderAnalise();
        if(id === 'tela3') renderPlanos();
        if(id === 'tela4') renderGrafico();
        if(id === 'tela6') renderReport();
        window.scrollTo(0,0);
    }

    function salvarLocal() {
        localStorage.setItem('fmx_db', JSON.stringify(db));
        localStorage.setItem('fmx_planos', JSON.stringify(planos));
    }

    function salvarRegistro() {
        const entry = {
            id: Date.now(),
            data: document.getElementById('f-data').value || new Date().toISOString().split('T')[0],
            tecnico: document.getElementById('f-tecnico').value,
            tag: document.getElementById('f-tag').value.toUpperCase(),
            time: document.getElementById('f-time').value,
            setor: document.getElementById('f-setor').value,
            falha: document.getElementById('f-falha').value,
            acao: document.getElementById('f-acao').value
        };

        if(!entry.tag || !entry.falha) return alert("Preencha TAG e Ocorrência!");
        
        db.push(entry);
        salvarLocal();
        alert("Registrado!");
        location.reload(); 
    }

    function renderReport() {
        const div = document.getElementById('report-lista');
        const search = document.getElementById('search-report').value.toUpperCase();
        div.innerHTML = '';

        ["Time 1", "Time 2", "Time 3"].forEach(t => {
            const filtrados = db.filter(i => i.time === t && (i.tag.includes(search) || i.falha.includes(search)));
            if(filtrados.length > 0) {
                div.innerHTML += `<div class="time-header">${t}</div>`;
                filtrados.reverse().forEach(i => {
                    div.innerHTML += `
                        <div class="card">
                            <button class="btn-delete" onclick="excluirRegistro(${i.id})">🗑</button>
                            <strong>${i.tecnico}</strong> | <span class="tag-info">${i.tag}</span><br>
                            <small>${i.data} - ${i.setor}</small><hr>
                            <div class="txt-blue">${i.falha}</div>
                            <div class="txt-green">${i.acao}</div>
                        </div>`;
                });
            }
        });
    }

    function renderAnalise() {
        const div = document.getElementById('analise-lista');
        div.innerHTML = '<h3>Reincidências</h3>';
        const counts = {};
        db.forEach(i => { const k = i.tag; counts[k] = (counts[k] || 0) + 1; });
        
        Object.keys(counts).forEach(tag => {
            const n = counts[tag];
            const nivel = n >= 8 ? 'critical' : n >= 5 ? 'high' : n >= 2 ? 'medium' : 'low';
            div.innerHTML += `<div class="card"><span class="badge ${nivel}">Frequência: ${n}</span><br>TAG: <strong>${tag}</strong></div>`;
        });
    }

    function renderGrafico() {
        const ctx = document.getElementById('graficoSetores').getContext('2d');
        const setores = ["Mecânica", "Hidráulica", "Pneumática", "Elétrica", "Robótica", "Processo", "Operacional"];
        const dados = setores.map(s => db.filter(i => i.setor === s).length);
        
        if(chartFmx) chartFmx.destroy();
        chartFmx = new Chart(ctx, {
            type: 'bar',
            data: { labels: setores, datasets: [{ label: 'Qtd Falhas', data: dados, backgroundColor: '#0056b3' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function excluirRegistro(id) {
        if(confirm("Excluir definitivamente?")) {
            db = db.filter(i => i.id !== id);
            salvarLocal();
            renderReport();
        }
    }

    function atualizarDatalist() {
        const list = document.getElementById('lista-tags');
        const tags = [...new Set(db.map(i => i.tag))];
        list.innerHTML = tags.map(t => `<option value="${t}">`).join('');
        document.getElementById('p-tag').innerHTML = tags.map(t => `<option>${t}</option>`).join('');
    }

    function exportarDados() {
        const blob = new Blob([JSON.stringify({db, planos})], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "backup_fmx.json"; a.click();
    }

    // Inicializa a data de hoje no input
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    atualizarDatalist();

</script>
</body>
</html>
